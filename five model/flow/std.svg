<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="100%" height="100%" style="background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2" />
      <stop offset="100%" stop-color="#357abd" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71" />
      <stop offset="100%" stop-color="#27ae60" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e67e22" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#7f8c8d" />
    </marker>
  </defs>

  <text x="200" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">1. Data Scaling &amp; Persistence</text>

  <rect x="50" y="60" width="300" height="60" rx="8" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1" />
  <text x="200" y="88" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Initialize Scaler</text>
  <text x="200" y="106" text-anchor="middle" fill="#e0e0e0" font-size="11" font-family="monospace">scaler = StandardScaler()</text>

  <line x1="200" y1="120" x2="200" y2="160" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="50" y="160" width="300" height="70" rx="8" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1" />
  <text x="200" y="188" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Fit &amp; Transform Training Data</text>
  <text x="200" y="206" text-anchor="middle" fill="#e0e0e0" font-size="11" font-family="monospace">scaler.fit_transform(X_train)</text>
  <text x="200" y="220" text-anchor="middle" fill="#f1c40f" font-size="10" font-weight="500">Learns mean/std; Outputs X_train_scaled</text>

  <line x1="200" y1="230" x2="200" y2="270" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="50" y="270" width="300" height="70" rx="8" fill="url(#blueGrad)" stroke="#2980b9" stroke-width="1" />
  <text x="200" y="298" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Transform Test Data</text>
  <text x="200" y="316" text-anchor="middle" fill="#e0e0e0" font-size="11" font-family="monospace">scaler.transform(X_test)</text>
  <text x="200" y="330" text-anchor="middle" fill="#f1c40f" font-size="10" font-weight="500">Uses training mean/std; Outputs X_test_scaled</text>

  <line x1="200" y1="340" x2="200" y2="380" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="50" y="380" width="300" height="60" rx="8" fill="url(#greenGrad)" stroke="#27ae60" stroke-width="1" />
  <text x="200" y="408" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Serialize &amp; Save Scaler</text>
  <text x="200" y="426" text-anchor="middle" fill="#e0e0e0" font-size="11" font-family="monospace">joblib.dump(scaler, ...)</text>

  <line x1="200" y1="440" x2="200" y2="475" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4" />

  <path d="M 120 475 L 280 475 L 290 485 L 290 510 L 110 510 L 110 485 Z" fill="url(#orangeGrad)" stroke="#d35400" stroke-width="1" />
  <text x="200" y="497" text-anchor="middle" fill="white" font-size="12" font-weight="bold">📄 mnist_scaler.joblib</text>
</svg>
