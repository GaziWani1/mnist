<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 890" width="100%" height="100%" style="background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6" />
      <stop offset="100%" stop-color="#8e44ad" />
    </linearGradient>
    <linearGradient id="blueGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db" />
      <stop offset="100%" stop-color="#2980b9" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1abc9c" />
      <stop offset="100%" stop-color="#16a085" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c" />
      <stop offset="100%" stop-color="#c0392b" />
    </linearGradient>
    <linearGradient id="orangeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e67e22" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#7f8c8d" />
    </marker>
  </defs>

  <text x="250" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">2. Model Tuning &amp; Evaluation Loop</text>

  <rect x="75" y="60" width="350" height="50" rx="25" fill="url(#purpleGrad)" stroke="#7d3c98" stroke-width="1" />
  <text x="250" y="85" text-anchor="middle" fill="white" font-size="13" font-weight="bold">FOR EACH name, (model, params) IN base_models</text>
  <text x="250" y="100" text-anchor="middle" fill="#f4ecf7" font-size="10" font-family="monospace">Iterating through candidate algorithms</text>

  <line x1="250" y1="110" x2="250" y2="140" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="100" y="140" width="300" height="75" rx="6" fill="url(#blueGrad2)" stroke="#2471a3" stroke-width="1" />
  <text x="250" y="165" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Configure Hyperparameter Search</text>
  <text x="250" y="185" text-anchor="middle" fill="#ebf5fb" font-size="11" font-family="monospace">GridSearchCV(cv=3, scoring='accuracy')</text>
  <text x="250" y="200" text-anchor="middle" fill="#f1c40f" font-size="10">n_jobs=-1 (Uses all available CPU cores)</text>

  <line x1="250" y1="215" x2="250" y2="245" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="100" y="245" width="300" height="65" rx="6" fill="url(#blueGrad2)" stroke="#2471a3" stroke-width="1" />
  <text x="250" y="270" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Execute Search &amp; Cross-Validation</text>
  <text x="250" y="290" text-anchor="middle" fill="#ebf5fb" font-size="11" font-family="monospace">grid.fit(X_train_scaled, y_train)</text>

  <line x1="250" y1="310" x2="250" y2="340" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="100" y="340" width="300" height="65" rx="6" fill="url(#tealGrad)" stroke="#117a65" stroke-width="1" />
  <text x="250" y="365" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Extract Best Performing Estimator</text>
  <text x="250" y="385" text-anchor="middle" fill="#e8f8f5" font-size="11" font-family="monospace">best_model = grid.best_estimator_</text>

  <line x1="250" y1="405" x2="250" y2="435" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="100" y="435" width="300" height="65" rx="6" fill="url(#tealGrad)" stroke="#117a65" stroke-width="1" />
  <text x="250" y="460" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Generate Test Predictions</text>
  <text x="250" y="480" text-anchor="middle" fill="#e8f8f5" font-size="11" font-family="monospace">y_pred = best_model.predict(X_test_scaled)</text>

  <line x1="250" y1="500" x2="250" y2="530" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="100" y="530" width="300" height="65" rx="6" fill="url(#redGrad)" stroke="#922b21" stroke-width="1" />
  <text x="250" y="555" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Calculate Generalization Metrics</text>
  <text x="250" y="575" text-anchor="middle" fill="#fdedd8" font-size="11" font-family="monospace">accuracy_score(y_test, y_pred)</text>

  <line x1="250" y1="595" x2="250" y2="625" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="100" y="625" width="300" height="65" rx="6" fill="url(#redGrad)" stroke="#922b21" stroke-width="1" />
  <text x="250" y="650" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Save Best Performing Model File</text>
  <text x="250" y="670" text-anchor="middle" fill="#fdedd8" font-size="11" font-family="monospace">joblib.dump(best_model, f"{name}_best.joblib")</text>

  <line x1="400" y1="657" x2="435" y2="657" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="3" />
  <path d="M 435 645 L 485 645 L 493 653 L 493 673 L 435 673 Z" fill="url(#orangeGrad2)" stroke="#d35400" stroke-width="1" />
  <text x="464" y="663" text-anchor="middle" fill="white" font-size="9" font-weight="bold">.joblib</text>

  <line x1="250" y1="690" x2="250" y2="720" stroke="#7f8c8d" stroke-width="2" />
  <line x1="250" y1="720" x2="40" y2="720" stroke="#7f8c8d" stroke-width="2" />
  <line x1="40" y1="720" x2="40" y2="85" stroke="#7f8c8d" stroke-width="2" />
  <line x1="40" y1="85" x2="75" y2="85" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)" />
  
  <text x="50" y="710" fill="#7f8c8d" font-size="11" font-weight="bold">Next Model</text>
</svg>
