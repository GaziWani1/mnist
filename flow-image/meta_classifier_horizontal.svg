<svg width="900" viewBox="0 0 900 420" role="img" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<style>
  .th { font-size:13px; font-weight:700; fill:#1a1a2e; }
  .ts { font-size:11px; fill:#444; }
  .tc { font-size:10px; fill:#555; }
  .box-gray   { fill:#f0f0f0; stroke:#aaa; }
  .box-purple { fill:#ede9fe; stroke:#7c3aed; }
  .box-teal   { fill:#ccfbf1; stroke:#0d9488; }
  .box-blue   { fill:#dbeafe; stroke:#3b82f6; }
  .box-coral  { fill:#fee2e2; stroke:#ef4444; }
  .box-green  { fill:#dcfce7; stroke:#16a34a; }
  .box-amber  { fill:#fef9c3; stroke:#ca8a04; }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ══════════════════════════════════════ -->
<!-- STEP 1: INPUT IMAGE -->
<!-- ══════════════════════════════════════ -->
<rect x="10" y="160" width="100" height="60" rx="8" class="box-gray" stroke-width="1"/>
<text class="th" x="60" y="182" text-anchor="middle">Input</text>
<text class="th" x="60" y="198" text-anchor="middle">Image</text>
<text class="tc" x="60" y="214" text-anchor="middle">784 pixels</text>
<line x1="110" y1="190" x2="138" y2="190" stroke="#555" marker-end="url(#arr)"/>

<!-- ══════════════════════════════════════ -->
<!-- STEP 2: 10 BINARY MODELS (stacked vertically) -->
<!-- ══════════════════════════════════════ -->
<text class="th" x="230" y="22" text-anchor="middle">10 Binary LR Models</text>
<text class="tc" x="230" y="38" text-anchor="middle">(trained with GridSearchCV)</text>

<!-- model boxes -->
<rect x="140" y="44"  width="120" height="26" rx="5" class="box-purple" stroke-width="1"/>
<text class="tc"  x="200" y="57"  text-anchor="middle" font-weight="700">LR Model: digit 0</text>

<rect x="140" y="76"  width="120" height="26" rx="5" class="box-purple" stroke-width="1"/>
<text class="tc"  x="200" y="89"  text-anchor="middle" font-weight="700">LR Model: digit 1</text>

<rect x="140" y="108" width="120" height="26" rx="5" class="box-purple" stroke-width="1"/>
<text class="tc"  x="200" y="121" text-anchor="middle" font-weight="700">LR Model: digit 2</text>

<rect x="140" y="140" width="120" height="26" rx="5" class="box-purple" stroke-width="1"/>
<text class="tc"  x="200" y="153" text-anchor="middle" font-weight="700">LR Model: digit 3</text>

<rect x="140" y="172" width="120" height="26" rx="5" class="box-purple" stroke-width="1"/>
<text class="tc"  x="200" y="185" text-anchor="middle" font-weight="700">LR Model: digit 4</text>

<rect x="140" y="204" width="120" height="26" rx="5" class="box-teal"   stroke-width="1.5"/>
<text class="tc"  x="200" y="217" text-anchor="middle" font-weight="700">LR Model: digit 5 ★</text>

<rect x="140" y="236" width="120" height="26" rx="5" class="box-purple" stroke-width="1"/>
<text class="tc"  x="200" y="249" text-anchor="middle" font-weight="700">LR Model: digit 6</text>

<rect x="140" y="268" width="120" height="26" rx="5" class="box-purple" stroke-width="1"/>
<text class="tc"  x="200" y="281" text-anchor="middle" font-weight="700">LR Model: digit 7</text>

<rect x="140" y="300" width="120" height="26" rx="5" class="box-purple" stroke-width="1"/>
<text class="tc"  x="200" y="313" text-anchor="middle" font-weight="700">LR Model: digit 8</text>

<rect x="140" y="332" width="120" height="26" rx="5" class="box-purple" stroke-width="1"/>
<text class="tc"  x="200" y="345" text-anchor="middle" font-weight="700">LR Model: digit 9</text>

<!-- fan lines from input to each model -->
<line x1="110" y1="190" x2="138" y2="57"  stroke="#aaa" stroke-width="0.8"/>
<line x1="110" y1="190" x2="138" y2="89"  stroke="#aaa" stroke-width="0.8"/>
<line x1="110" y1="190" x2="138" y2="121" stroke="#aaa" stroke-width="0.8"/>
<line x1="110" y1="190" x2="138" y2="153" stroke="#aaa" stroke-width="0.8"/>
<line x1="110" y1="190" x2="138" y2="185" stroke="#aaa" stroke-width="0.8"/>
<line x1="110" y1="190" x2="138" y2="217" stroke="#0d9488" stroke-width="1.2"/>
<line x1="110" y1="190" x2="138" y2="249" stroke="#aaa" stroke-width="0.8"/>
<line x1="110" y1="190" x2="138" y2="281" stroke="#aaa" stroke-width="0.8"/>
<line x1="110" y1="190" x2="138" y2="313" stroke="#aaa" stroke-width="0.8"/>
<line x1="110" y1="190" x2="138" y2="345" stroke="#aaa" stroke-width="0.8"/>

<!-- ══════════════════════════════════════ -->
<!-- STEP 3: PROBABILITY OUTPUTS -->
<!-- ══════════════════════════════════════ -->
<text class="th" x="380" y="22" text-anchor="middle">Output Probabilities</text>
<text class="tc" x="380" y="38" text-anchor="middle">predict_proba[:, 1]</text>

<!-- prob cells -->
<rect x="292" y="44"  width="80" height="26" rx="5" class="box-blue" stroke-width="1"/>
<text class="tc"  x="332" y="57"  text-anchor="middle">P(digit=0) = 0.01</text>
<line x1="260" y1="57"  x2="290" y2="57"  stroke="#555" marker-end="url(#arr)"/>

<rect x="292" y="76"  width="80" height="26" rx="5" class="box-blue" stroke-width="1"/>
<text class="tc"  x="332" y="89"  text-anchor="middle">P(digit=1) = 0.00</text>
<line x1="260" y1="89"  x2="290" y2="89"  stroke="#555" marker-end="url(#arr)"/>

<rect x="292" y="108" width="80" height="26" rx="5" class="box-blue" stroke-width="1"/>
<text class="tc"  x="332" y="121" text-anchor="middle">P(digit=2) = 0.02</text>
<line x1="260" y1="121" x2="290" y2="121" stroke="#555" marker-end="url(#arr)"/>

<rect x="292" y="140" width="80" height="26" rx="5" class="box-blue" stroke-width="1"/>
<text class="tc"  x="332" y="153" text-anchor="middle">P(digit=3) = 0.01</text>
<line x1="260" y1="153" x2="290" y2="153" stroke="#555" marker-end="url(#arr)"/>

<rect x="292" y="172" width="80" height="26" rx="5" class="box-blue" stroke-width="1"/>
<text class="tc"  x="332" y="185" text-anchor="middle">P(digit=4) = 0.00</text>
<line x1="260" y1="185" x2="290" y2="185" stroke="#555" marker-end="url(#arr)"/>

<rect x="292" y="204" width="80" height="26" rx="5" class="box-teal" stroke-width="1.5"/>
<text class="tc"  x="332" y="217" text-anchor="middle" font-weight="700">P(digit=5) = 0.88 ★</text>
<line x1="260" y1="217" x2="290" y2="217" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr-g)"/>

<rect x="292" y="236" width="80" height="26" rx="5" class="box-blue" stroke-width="1"/>
<text class="tc"  x="332" y="249" text-anchor="middle">P(digit=6) = 0.03</text>
<line x1="260" y1="249" x2="290" y2="249" stroke="#555" marker-end="url(#arr)"/>

<rect x="292" y="268" width="80" height="26" rx="5" class="box-blue" stroke-width="1"/>
<text class="tc"  x="332" y="281" text-anchor="middle">P(digit=7) = 0.01</text>
<line x1="260" y1="281" x2="290" y2="281" stroke="#555" marker-end="url(#arr)"/>

<rect x="292" y="300" width="80" height="26" rx="5" class="box-blue" stroke-width="1"/>
<text class="tc"  x="332" y="313" text-anchor="middle">P(digit=8) = 0.02</text>
<line x1="260" y1="313" x2="290" y2="313" stroke="#555" marker-end="url(#arr)"/>

<rect x="292" y="332" width="80" height="26" rx="5" class="box-blue" stroke-width="1"/>
<text class="tc"  x="332" y="345" text-anchor="middle">P(digit=9) = 0.02</text>
<line x1="260" y1="345" x2="290" y2="345" stroke="#555" marker-end="url(#arr)"/>

<!-- bracket label -->
<line x1="374" y1="44"  x2="390" y2="44"  stroke="#94a3b8" stroke-width="0.8"/>
<line x1="374" y1="358" x2="390" y2="358" stroke="#94a3b8" stroke-width="0.8"/>
<line x1="390" y1="44"  x2="390" y2="358" stroke="#94a3b8" stroke-width="0.8"/>
<line x1="390" y1="196" x2="406" y2="196" stroke="#94a3b8" stroke-width="0.8" marker-end="url(#arr)"/>
<text class="tc" x="392" y="176" text-anchor="start">1 row of</text>
<text class="tc" x="392" y="190" text-anchor="start">meta_train</text>
<text class="tc" x="392" y="204" text-anchor="start">or meta_test</text>
<text class="tc" x="392" y="218" text-anchor="start">[0.01, 0.00,</text>
<text class="tc" x="392" y="232" text-anchor="start">0.02 ... 0.88]</text>

<!-- ══════════════════════════════════════ -->
<!-- STEP 4: META CLASSIFIER -->
<!-- ══════════════════════════════════════ -->
<rect x="540" y="140" width="150" height="110" rx="10" class="box-coral" stroke-width="1.5"/>
<text class="th"  x="615" y="162" text-anchor="middle">Meta Classifier</text>
<text class="ts"  x="615" y="180" text-anchor="middle">LogisticRegression</text>
<line x1="615" y1="186" x2="615" y2="200" stroke="#ef4444" stroke-width="0.5"/>
<text class="tc"  x="615" y="210" text-anchor="middle">Reads all 10 probs</text>
<text class="tc"  x="615" y="224" text-anchor="middle">Learns weights for</text>
<text class="tc"  x="615" y="238" text-anchor="middle">each digit model</text>

<line x1="490" y1="196" x2="538" y2="196" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>

<!-- ══════════════════════════════════════ -->
<!-- STEP 5: FINAL OUTPUT -->
<!-- ══════════════════════════════════════ -->
<rect x="710" y="158" width="140" height="74" rx="10" class="box-green" stroke-width="1.5"/>
<text class="th" x="780" y="178" text-anchor="middle">Predicted</text>
<text class="th" x="780" y="196" text-anchor="middle">Digit: 5 ✓</text>
<text class="ts" x="780" y="214" text-anchor="middle">Confidence: 88%</text>

<line x1="690" y1="195" x2="708" y2="195" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>

<!-- ══════════════════════════════════════ -->
<!-- BOTTOM: TRAINING vs INFERENCE note -->
<!-- ══════════════════════════════════════ -->
<rect x="10" y="378" width="880" height="36" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text class="tc" x="130" y="392" text-anchor="middle" font-weight="700">TRAINING TIME:</text>
<text class="tc" x="370" y="392" text-anchor="middle">meta_model.fit(meta_train, y_train)  →  Meta LR learns weights from 56,000 rows of OOF probs</text>
<text class="tc" x="130" y="406" text-anchor="middle" font-weight="700">INFERENCE TIME:</text>
<text class="tc" x="340" y="406" text-anchor="middle">meta_model.predict(meta_test)  →  Uses those learned weights to predict digit from 10 probs</text>
</svg>
