<svg width="900" viewBox="0 0 900 480" role="img" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<style>
  .th { font-size:13px; font-weight:700; fill:#1a1a2e; }
  .ts { font-size:11px; fill:#444; }
  .tc { font-size:10px; fill:#555; }
  .tred { font-size:10px; fill:#dc2626; font-weight:700; }
  .tgreen { font-size:10px; fill:#16a34a; font-weight:700; }
  .box-gray   { fill:#f0f0f0; stroke:#aaa; }
  .box-purple { fill:#ede9fe; stroke:#7c3aed; }
  .box-teal   { fill:#ccfbf1; stroke:#0d9488; }
  .box-blue   { fill:#dbeafe; stroke:#3b82f6; }
  .box-coral  { fill:#fee2e2; stroke:#ef4444; }
  .box-green  { fill:#dcfce7; stroke:#16a34a; }
  .box-amber  { fill:#fef9c3; stroke:#ca8a04; }
  .box-red    { fill:#fecaca; stroke:#dc2626; }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ══════════════════════════════════ -->
<!-- TOP LABEL -->
<!-- ══════════════════════════════════ -->
<text class="th" x="450" y="22" text-anchor="middle">Why OOF? — Direct Predict vs cross_val_predict</text>

<!-- ══════════════════════════════════ -->
<!-- LEFT SIDE: WRONG WAY -->
<!-- ══════════════════════════════════ -->
<rect x="10" y="34" width="420" height="300" rx="12" class="box-red" stroke-width="1.5"/>
<text class="th"  x="220" y="56"  text-anchor="middle" fill="#dc2626">❌ Wrong Way — Direct predict_proba</text>

<!-- Step 1 -->
<rect x="26"  y="68" width="180" height="38" rx="7" class="box-purple" stroke-width="1"/>
<text class="th" x="116" y="83"  text-anchor="middle">best_model.fit</text>
<text class="tc" x="116" y="97"  text-anchor="middle">Trains on ALL X_train (56k)</text>

<line x1="208" y1="87" x2="234" y2="87" stroke="#dc2626" marker-end="url(#arr-r)"/>

<!-- Step 2 -->
<rect x="236" y="68" width="180" height="38" rx="7" class="box-red" stroke-width="1"/>
<text class="th" x="326" y="83"  text-anchor="middle">predict_proba(X_train)</text>
<text class="tc" x="326" y="97"  text-anchor="middle">Same data it trained on!</text>

<!-- Problem arrow -->
<line x1="326" y1="106" x2="326" y2="128" stroke="#dc2626" marker-end="url(#arr-r)"/>

<!-- Problem box -->
<rect x="176" y="130" width="240" height="50" rx="7" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
<text class="tred" x="296" y="150" text-anchor="middle">Model memorized the answers!</text>
<text class="tc"   x="296" y="166" text-anchor="middle">Probabilities: [0.99, 0.98, 0.97 ...]</text>

<line x1="296" y1="180" x2="296" y2="202" stroke="#dc2626" marker-end="url(#arr-r)"/>

<!-- Fake meta_train -->
<rect x="136" y="204" width="320" height="38" rx="7" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
<text class="th"  x="296" y="219" text-anchor="middle" fill="#dc2626">meta_train — FAKE (inflated probs)</text>
<text class="tc"  x="296" y="233" text-anchor="middle">Meta classifier trains on unrealistic data</text>

<line x1="296" y1="242" x2="296" y2="264" stroke="#dc2626" marker-end="url(#arr-r)"/>

<!-- Result -->
<rect x="96" y="266" width="400" height="52" rx="7" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
<text class="tred" x="296" y="286" text-anchor="middle">Meta model overfits to fake distribution</text>
<text class="tc"   x="296" y="302" text-anchor="middle">Real test data → completely different probs → accuracy drops</text>

<!-- STUDENT ANALOGY LEFT -->
<rect x="26" y="344" width="390" height="34" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
<text class="tc" x="221" y="357" text-anchor="middle" font-weight="700">Analogy: Student saw exam questions beforehand → 100% marks</text>
<text class="tc" x="221" y="371" text-anchor="middle">but failed in the next class → learned nothing real</text>

<!-- ══════════════════════════════════ -->
<!-- RIGHT SIDE: CORRECT WAY -->
<!-- ══════════════════════════════════ -->
<rect x="460" y="34" width="430" height="300" rx="12" class="box-green" stroke-width="1.5"/>
<text class="th"  x="675" y="56" text-anchor="middle" fill="#16a34a">✓ Correct Way — cross_val_predict OOF</text>

<!-- 5 fold strip -->
<text class="tc" x="675" y="76" text-anchor="middle">56,000 samples split into 5 folds:</text>

<rect x="474" y="82" width="64" height="28" rx="5" class="box-coral" stroke-width="1.5"/>
<text class="tc"  x="506" y="96" text-anchor="middle">test F1</text>
<rect x="544" y="82" width="64" height="28" rx="5" class="box-teal" stroke-width="1"/>
<text class="tc"  x="576" y="96" text-anchor="middle">train</text>
<rect x="614" y="82" width="64" height="28" rx="5" class="box-teal" stroke-width="1"/>
<text class="tc"  x="646" y="96" text-anchor="middle">train</text>
<rect x="684" y="82" width="64" height="28" rx="5" class="box-teal" stroke-width="1"/>
<text class="tc"  x="716" y="96" text-anchor="middle">train</text>
<rect x="754" y="82" width="64" height="28" rx="5" class="box-teal" stroke-width="1"/>
<text class="tc"  x="786" y="96" text-anchor="middle">train</text>

<text class="tc" x="675" y="128" text-anchor="middle">Round 1: Train on F2+F3+F4+F5 → Predict F1</text>
<text class="tc" x="675" y="142" text-anchor="middle">Round 2: Train on F1+F3+F4+F5 → Predict F2</text>
<text class="tc" x="675" y="156" text-anchor="middle">· · · 5 rounds total · · ·</text>

<line x1="675" y1="164" x2="675" y2="186" stroke="#16a34a" marker-end="url(#arr-g)"/>

<!-- Key rule box -->
<rect x="494" y="188" width="362" height="36" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text class="tgreen" x="675" y="202" text-anchor="middle">Rule: Each sample is predicted only by</text>
<text class="tgreen" x="675" y="218" text-anchor="middle">a model that never trained on it</text>

<line x1="675" y1="224" x2="675" y2="246" stroke="#16a34a" marker-end="url(#arr-g)"/>

<!-- Clean meta_train -->
<rect x="494" y="248" width="362" height="38" rx="7" class="box-teal" stroke-width="1.5"/>
<text class="th"  x="675" y="263" text-anchor="middle" fill="#0d9488">meta_train — HONEST (realistic probs)</text>
<text class="tc"  x="675" y="279" text-anchor="middle">Probs look like real test data → no leakage</text>

<line x1="675" y1="286" x2="675" y2="308" stroke="#16a34a" marker-end="url(#arr-g)"/>

<!-- Result -->
<rect x="494" y="310" width="362" height="14" rx="7" class="box-green" stroke-width="1"/>
<text class="tgreen" x="675" y="321" text-anchor="middle">Meta model generalizes well → high accuracy on real test</text>

<!-- STUDENT ANALOGY RIGHT -->
<rect x="474" y="344" width="400" height="34" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
<text class="tc" x="674" y="357" text-anchor="middle" font-weight="700">Analogy: Student practiced on unseen questions</text>
<text class="tc" x="674" y="371" text-anchor="middle">→ performed well on the real exam too (genuine learning)</text>

<!-- ══════════════════════════════════ -->
<!-- BOTTOM SUMMARY ROW -->
<!-- ══════════════════════════════════ -->
<rect x="10" y="392" width="880" height="76" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text class="th" x="450" y="412" text-anchor="middle">Bottom line — why this matters for Stacking specifically</text>

<rect x="26"  y="424" width="260" height="34" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
<text class="tc" x="156" y="438" text-anchor="middle" font-weight="700">Direct predict → Data Leakage</text>
<text class="tc" x="156" y="452" text-anchor="middle">meta_train distribution ≠ meta_test distribution</text>

<text class="th" x="450" y="444" text-anchor="middle">vs</text>

<rect x="614" y="424" width="260" height="34" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<text class="tc" x="744" y="438" text-anchor="middle" font-weight="700">OOF → No Leakage</text>
<text class="tc" x="744" y="452" text-anchor="middle">meta_train probs ≈ meta_test probs → stable learning</text>
</svg>
